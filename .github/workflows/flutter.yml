name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.24.0
          cache: true

      - name: Flutter Version
        run: flutter --version

      - name: Generate Android Scaffold (if missing)
        run: |
          if [ ! -f "android/app/build.gradle" ] && [ ! -f "android/app/build.gradle.kts" ]; then
            flutter create --platforms=android --org com.example --project-name whatsapp_media_cleaner .
          fi

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Release APK
        run: flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: whatsapp-media-cleaner-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
